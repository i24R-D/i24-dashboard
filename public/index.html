<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i24NEWS Apps Dashboard</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#06234b">
    <meta name="description" content="i24NEWS Internal Applications Dashboard">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #06234b;
            --bg-secondary: #0a3366;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --i24-red: #e31937;
            --i24-red-glow: rgba(227, 25, 55, 0.3);
            --accent-cyan: #00d4ff;
            --accent-purple: #a855f7;
            --accent-orange: #ff6b35;
            --accent-green: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(227, 25, 55, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(227, 25, 55, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(0, 212, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            pointer-events: none;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 80px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .i24-logo {
            height: 60px;
            width: auto;
            filter: brightness(1.1);
        }

        .tagline {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        h1 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 300;
            letter-spacing: -0.5px;
            color: var(--text-secondary);
        }

        /* Speed dial grid */
        .speed-dial-grid {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: nowrap;
        }

        /* Speed dial card */
        .dial-card {
            position: relative;
            width: 140px;
            height: 140px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .dial-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--card-accent) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
            border-radius: 16px;
        }

        .dial-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--card-accent);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.4),
                0 0 60px var(--card-glow);
        }

        .dial-card:hover::before {
            opacity: 0.15;
        }

        .dial-icon {
            font-size: 1.8rem;
            margin-bottom: 10px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 1;
        }

        .dial-card:hover .dial-icon {
            transform: scale(1.15);
        }

        .dial-name {
            font-size: 0.75rem;
            font-weight: 500;
            text-align: center;
            position: relative;
            z-index: 1;
            padding: 0 8px;
            line-height: 1.3;
        }

        .dial-slug {
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            color: var(--text-secondary);
            margin-top: 6px;
            opacity: 0.7;
            position: relative;
            z-index: 1;
        }

        /* Color variants */
        .dial-card.red { --card-accent: var(--i24-red); --card-glow: var(--i24-red-glow); }
        .dial-card.cyan { --card-accent: var(--accent-cyan); --card-glow: rgba(0, 212, 255, 0.2); }
        .dial-card.purple { --card-accent: var(--accent-purple); --card-glow: rgba(168, 85, 247, 0.2); }
        .dial-card.orange { --card-accent: var(--accent-orange); --card-glow: rgba(255, 107, 53, 0.2); }
        .dial-card.green { --card-accent: var(--accent-green); --card-glow: rgba(16, 185, 129, 0.2); }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--glass-border);
        }

        .footer-text {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .container {
                padding: 40px 20px;
            }
            
            .speed-dial-grid {
                flex-wrap: wrap;
                gap: 12px;
            }

            .dial-card {
                width: 120px;
                height: 120px;
            }

            header {
                margin-bottom: 50px;
            }

            .dial-icon {
                font-size: 1.5rem;
            }

            .dial-name {
                font-size: 0.7rem;
            }

            .i24-logo {
                height: 50px;
            }
        }

        @media (max-width: 500px) {
            .dial-card {
                width: 100px;
                height: 100px;
            }
        }

        /* Entrance animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            animation: fadeInUp 0.6s ease backwards;
        }

        .dial-card {
            animation: fadeInUp 0.6s ease backwards;
        }

        .dial-card:nth-child(1) { animation-delay: 0.15s; }
        .dial-card:nth-child(2) { animation-delay: 0.25s; }
        .dial-card:nth-child(3) { animation-delay: 0.35s; }
        .dial-card:nth-child(4) { animation-delay: 0.45s; }
        .dial-card:nth-child(5) { animation-delay: 0.55s; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="noise"></div>
    
    <div class="container">
        <header>
            <p class="tagline">Internal Tools</p>
            <div class="logo-container">
                <img src="/i24-logo.webp" alt="i24NEWS" class="i24-logo">
            </div>
            <h1>Apps Dashboard</h1>
        </header>

        <div class="speed-dial-grid">

            <a href="https://i24-studioscheduledisplay.netlify.app/" class="dial-card red" target="_blank" rel="noopener noreferrer">
                <span class="dial-icon">📺</span>
                <span class="dial-name">Studio Schedule Display</span>
            </a>

            <a href="https://i24-mcr-ext.netlify.app/" class="dial-card cyan" target="_blank" rel="noopener noreferrer">
                <span class="dial-icon">🎛️</span>
                <span class="dial-name">MCR Extension</span>
            </a>

            <a href="https://i24-tvmaps.netlify.app/" class="dial-card green" target="_blank" rel="noopener noreferrer">
                <span class="dial-icon">🗺️</span>
                <span class="dial-name">TV Maps</span>
            </a>

            <a href="https://github.com/notjeremie/i24-countdown" class="dial-card orange" target="_blank" rel="noopener noreferrer">
                <span class="dial-icon">⏱️</span>
                <span class="dial-name">Countdowns</span>
            </a>

            <a href="https://app--i24-daily-pics-bea0d522.base44.app/" class="dial-card purple" target="_blank" rel="noopener noreferrer">
                <span class="dial-icon">🖼️</span>
                <span class="dial-name">Daily Pics</span>
            </a>

        </div>

        <footer>
            <p class="footer-text">by Jeremie Quenet for i24NEWS</p>
        </footer>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
